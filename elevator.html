<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Elevator Works | Indrani Infra Projects</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="logo-box">
        <img src="image.png" class="logo">
        <h1 class="brand-name">Indrani Infra Projects</h1>
        <p class="brand-tagline">Constructions • Electricals • Elevators • Interior Designing</p>
    </div>
</header>

<nav class="navbar">
    <a href="index.html">⬅ Back to Home</a>
</nav>


<section class="section">
    <h2 class="title">Our Elevator Works</h2>

    <div class="gallery">

        <img src="elevator/L1.jpeg">
        <img src="elevator/L2.jpeg">
        <img src="elevator/L3.jpeg">
        <img src="elevator/L4.jpeg">
        <img src="elevator/L5.jpeg">
        <img src="elevator/L6.jpeg">
        <img src="elevator/L7.jpeg">
        <img src="elevator/L8.jpeg">
        <img src="elevator/L9.jpeg">
        <img src="elevator/L10.jpeg">
        <img src="elevator/L11.jpeg">
        <img src="elevator/L12.jpeg">
        <img src="elevator/L13.jpeg">
        <img src="elevator/L14.jpeg">
        <img src="elevator/L15.jpeg">

    </div>
</section>


<section class="section">
    <h2 class="title">Work Videos</h2>

    <div class="video-grid">

        <video controls controlsList="nodownload noplaybackrate noremoteplayback">
            <source src="elevator/L1.mp4" type="video/mp4">
        </video>

        <video controls controlsList="nodownload noplaybackrate noremoteplayback">
            <source src="elevator/L2.mp4" type="video/mp4">
        </video>

       <video controls controlsList="nodownload noplaybackrate noremoteplayback">
            <source src="elevator/L3.mp4" type="video/mp4">
       </video>

    </div>
</section>

<footer>
    © 2026 Indrani Infra Projects
</footer>
<div id="popup" class="popup">
    <span class="close">&times;</span>
    <img class="popup-img" id="popupImg">
</div>

<script>
const images = document.querySelectorAll(".gallery img");
const popup = document.getElementById("popup");
const popupImg = document.getElementById("popupImg");
const closeBtn = document.querySelector(".close");

images.forEach(img => {
    img.onclick = () => {
        popup.style.display = "flex";
        popupImg.src = img.src;
    }
});

closeBtn.onclick = () => popup.style.display = "none";
popup.onclick = () => popup.style.display = "none";
</script>

</body>
</html>
